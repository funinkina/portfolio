baseURL = 'https://funinkina.co.in/'
title = "funinkina's corner"

[minify]
minifyOutput = true

[caches]
[caches.getresource]
dir = ":resourceDir/_gen"
maxAge = -1

[markup.highlight]
noClasses = false
locale = 'en-us'

[sitemap]
changefreq = "weekly"
filename = "sitemap.xml"
priority = 0.5

[params]
author = "Aryan K."
subtitle = "23 • Systems and Backend Engineer • ENGLISH / हिंदी"
location = "Bangalore, India"
avatar = "avatar.jpg"
description = "A collection of blogs, projects and opinions by funinkina."
ShowReadingTime = true
ShowDate = true
favicon = "favicon.ico"

[params.vercel_analytics]
enable = true

[params.vercel_speed_insights]
enable = true

[related]
threshold = 80
includeNewer = true
toLower = true

[[related.indices]]
name = "tags"
weight = 100

[permalinks]
blog = "/blog/:slug/"

[menu]
# [[menu.main]]
# name = "🏠 HOME"
# url = "/"
# weight = 1
[[menu.main]]
name = "<span class='material-symbols-outlined' style='vertical-align: middle;'>newsmode</span> BLOGS"
url = "/blog/"
weight = 1
[[menu.main]]
name = "<span class='material-symbols-outlined' style='vertical-align: middle;'>deployed_code</span> PROJECTS"
url = "/projects/"
weight = 2
