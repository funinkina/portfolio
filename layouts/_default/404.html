{{ partial "header.html" . }}

<div class="mt-24 mb-16">
  <div
    class="font-['Fira_Code','Cascadia_Code','JetBrains_Mono',ui-monospace,monospace] overflow-hidden border border-solid border-[#2a2a2a] shadow-[0_12px_40px_rgba(0,0,0,0.5)] max-w-150">
    <div
      class="bg-[#1a1a1a] py-2.5 px-3.5 flex items-center gap-3 [border-bottom:1px_solid_#2a2a2a]">
      <div class="flex gap-1.5">
        <span class="w-3 h-3 rounded-full block bg-[#ff5f57]"></span>
        <span class="w-3 h-3 rounded-full block bg-[#febc2e]"></span>
        <span class="w-3 h-3 rounded-full block bg-[#28c840]"></span>
      </div>
      <span class="text-[#666] text-[0.8rem] mx-auto">bash — 80×24</span>
    </div>
    <div class="bg-[#0d0d0d] py-4 px-5 text-[#b5f0b5]">
      <p
        class="m-0 mb-1 text-[0.9rem] leading-[1.6] font-light text-[#b5f0b5]"><span
          class="text-[#39d353]">funinkina@corner:~$</span> cd {{
        .RelPermalink }}</p>
      <p
        class="m-0 mb-1 text-[0.9rem] leading-[1.6] font-light text-[#ff6b6b]">bash:
        cd: {{ .RelPermalink }}: No such file or
        directory</p>
      <p
        class="m-0 mb-1 text-[0.9rem] leading-[1.6] font-light text-[#555] italic">#
        maybe try one of these:</p>
      <p
        class="m-0 mb-1 text-[0.9rem] leading-[1.6] font-light text-[#b5f0b5]"><span
          class="text-[#39d353]">funinkina@corner:~$</span> ls /</p>
      <p class="m-0 mb-1 text-[0.9rem] leading-[1.6] font-light text-[#b5f0b5]">
        <a class="text-[#88b0ff] no-underline hover:underline"
          href="/">~/</a>&nbsp;&nbsp;&nbsp;
        <a class="text-[#88b0ff] no-underline hover:underline"
          href="/blog/">blog/</a>&nbsp;&nbsp;&nbsp;
        <a class="text-[#88b0ff] no-underline hover:underline"
          href="/projects/">projects/</a>&nbsp;&nbsp;&nbsp;
        <a class="text-[#88b0ff] no-underline hover:underline"
          href="/tags/">tags/</a>
      </p>
      <p
        class="m-0 mb-1 text-[0.9rem] leading-[1.6] font-light text-[#b5f0b5]"><span
          class="text-[#39d353]">funinkina@corner:~$</span> <span
          class="notfound-cursor">█</span></p>
    </div>
  </div>
</div>

{{ partial "footer.html" . }}
