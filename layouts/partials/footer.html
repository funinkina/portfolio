<br>

<footer>
  <p class="footer-shortcuts">
    <span class="fkey"><kbd>h</kbd> home</span>
    <span class="fkey"><kbd>b</kbd> blog</span>
    <span class="fkey"><kbd>p</kbd> projects</span>
    <span class="fkey"><kbd>i</kbd> search</span>
    <span class="fkey"><kbd>`</kbd> terminal</span>
    <span class="fkey"><kbd>/</kbd> shortcuts</span>
  </p>
{{ partial "footer_scripts.html" . }}
</footer>

<button id="back-to-top" aria-label="Back to top" title="Back to top">
  <span class="material-symbols-outlined" aria-hidden="true">arrow_upward</span>
</button>
<script>
(function () {
  var btn = document.getElementById('back-to-top');
  if (!btn) return;
  function onScroll() {
    var y = window.scrollY !== undefined ? window.scrollY : (window.pageYOffset || document.documentElement.scrollTop || 0);
    btn.classList.toggle('visible', y > 400);
  }
  window.addEventListener('scroll', onScroll, { passive: true });
  document.addEventListener('scroll', onScroll, { passive: true });
  btn.addEventListener('click', function () {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
})();
</script>

<div id="terminal-overlay" aria-hidden="true" role="dialog" aria-label="Terminal" aria-modal="true">
  <div id="terminal-window">
    <div id="terminal-titlebar">
      <div class="terminal-dots">
        <button class="terminal-dot terminal-dot-close" id="terminal-close-btn" aria-label="Close terminal" title="Close"></button>
        <span class="terminal-dot terminal-dot-min"></span>
        <span class="terminal-dot terminal-dot-max"></span>
      </div>
      <span id="terminal-title">funinkina@corner — bash</span>
    </div>
    <div id="terminal-body">
      <div id="terminal-output"></div>
      <div id="terminal-input-line">
        <span class="terminal-prompt">funinkina@corner:~$&nbsp;</span>
        <input type="text" id="terminal-input" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" aria-label="Terminal input">
      </div>
    </div>
  </div>
</div>

<div id="shortcuts-modal" class="shortcuts-modal" role="dialog" aria-modal="true" aria-label="Keyboard shortcuts" aria-hidden="true">
  <div class="shortcuts-modal-content" tabindex="-1">
    <div class="shortcuts-modal-header">
      <h2>Keyboard shortcuts</h2>
      <button class="shortcuts-modal-close" aria-label="Close shortcuts">&times;</button>
    </div>
    <dl class="shortcuts-list">
      <div><dt><kbd>h</kbd></dt><dd>Home</dd></div>
      <div><dt><kbd>b</kbd></dt><dd>Blog</dd></div>
      <div><dt><kbd>p</kbd></dt><dd>Projects</dd></div>
      <div><dt><kbd>i</kbd></dt><dd>Focus search</dd></div>
      <div><dt><kbd>`</kbd></dt><dd>Toggle terminal</dd></div>
      <div><dt><kbd>/</kbd></dt><dd>Show this panel</dd></div>
    </dl>
  </div>
</div>

</body>
</html>
