<button id="back-to-top" aria-label="Back to top" title="Back to top" class="fixed bottom-8 right-6 w-9.5 h-9.5 bg-card border border-solid border-border flex items-center justify-center cursor-pointer text-text-dim z-100 hover:text-text hover:border-text-dim">
  <span class="material-symbols-outlined text-xl p-0 leading-none" aria-hidden="true">arrow_upward</span>
</button>
<script>
(function () {
  var btn = document.getElementById('back-to-top');
  if (!btn) return;
  function onScroll() {
    var y = window.scrollY !== undefined ? window.scrollY : (window.pageYOffset || document.documentElement.scrollTop || 0);
    btn.classList.toggle('visible', y > 400);
  }
  window.addEventListener('scroll', onScroll, { passive: true });
  document.addEventListener('scroll', onScroll, { passive: true });
  btn.addEventListener('click', function () {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
})();

(function () {
  var nav = document.querySelector('.nav-bar');
  if (!nav) return;
  var lastY = window.scrollY || 0;
  var ticking = false;
  function update() {
    var y = window.scrollY || 0;
    if (y > lastY + 2) {
      nav.classList.add('nav-flush');
    } else if (y < lastY - 2) {
      nav.classList.remove('nav-flush');
    }
    lastY = y <= 0 ? 0 : y;
    ticking = false;
  }
  window.addEventListener('scroll', function () {
    if (!ticking) { window.requestAnimationFrame(update); ticking = true; }
  }, { passive: true });
})();
</script>
