<!-- Theme toggle. -->
<script defer>
  (function() {
    var btn = document.querySelector('.theme-toggle');
    var icon = btn && btn.querySelector('.material-symbols-outlined');

    function applyTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('theme', theme);
      if (icon) {
        icon.innerText = theme === 'dark' ? 'light_mode' : 'dark_mode';
      }
      btn && btn.setAttribute('title', theme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode');
    }

    if (btn) {
      var current = localStorage.getItem('theme') || 'dark';
      applyTheme(current);

      btn.addEventListener('click', function() {
        var next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        applyTheme(next);
      });
    }
  })();
</script>

<!-- Shortcuts. -->
<script defer>
  document.addEventListener("keydown", function (e) {
    if (document.activeElement.isContentEditable) {
      return false;
    }
    if (document.activeElement.tagName == "INPUT") {
      return false;
    }
    if (e.altKey || e.ctrlKey || e.shiftKey) {
      return false;
    }
    var key = e.key;
    if (key === "h") {
      e.preventDefault();
      e.stopPropagation();
      window.location.href = "/";
    } else if (key === "t") {
      e.preventDefault();
      e.stopPropagation();
      window.location.href = `https://${location.hostname}/tags`;
    } else if (key === "i") {
      e.preventDefault();
      e.stopPropagation();
      const inputs = document.querySelectorAll("input");
      for (let i = 0; i < inputs.length; i++) {
        if (inputs[i].offsetParent !== null) {
          inputs[i].selectionStart = inputs[i].selectionEnd =
            inputs[i].value.length;
          inputs[i].focus();
          break;
        }
      }
    }
    return false;
  });
</script>

<!-- Dynamic toc. -->
<script defer>
  function throttle(fn, wait) {
    var time = Date.now();
    return function () {
      var now = Date.now()
      if (time + wait - now < 0) {
        fn();
        time = now;
      }
    };
  }

  function scrollHandler() {
    // Changed selector to include all headings
    const anchors = Array.from(document.querySelectorAll("body main h1, body main h2, body main h3"));

    function scrollCallback() {
      var scrollTop = window.pageYOffset || document.documentElement.scrollTop;

      // Reset all active states
      document.querySelectorAll('nav ul li a').forEach(link => {
        link.classList.remove("active-toc");
      });

      // Find the last heading that we've scrolled past
      for (var i = anchors.length - 1; i >= 0; i--) {
        var offsetTop = anchors[i].offsetTop;
        if (scrollTop > offsetTop - 75) {
          var anchorId = anchors[i].getAttribute("id");
          var link = document.querySelector(
            'nav ul li a[href="#' + anchorId + '"]',
          );
          if (link) {
            link.classList.add("active-toc");
            break;
          }
        }
      }
    }

    window.addEventListener(
      "scroll",
      throttle(scrollCallback, 200),
    );
  }
  setTimeout(scrollHandler, 100);
</script>

<!-- Single page share button. -->
<script defer>
  function setupSingleShareButton() {
    const shareButton = document.querySelector(".single-share-button");

    if (!shareButton) {
      return;
    }

    const icon = shareButton.querySelector(".material-symbols-outlined");
    const originalLabel = shareButton.getAttribute("aria-label");

    function setShareIcon(name, label) {
      if (icon) {
        icon.innerText = name;
      }
      shareButton.setAttribute("aria-label", label);
      shareButton.setAttribute("title", label);
    }

    function copyWithFallback(text) {
      if (navigator.clipboard && window.isSecureContext) {
        return navigator.clipboard.writeText(text);
      }

      const textarea = document.createElement("textarea");
      textarea.value = text;
      textarea.setAttribute("readonly", "");
      textarea.style.position = "fixed";
      textarea.style.opacity = "0";
      document.body.append(textarea);
      textarea.select();
      document.execCommand("copy");
      textarea.remove();
      return Promise.resolve();
    }

    shareButton.addEventListener("click", async function () {
      const shareData = {
        title: shareButton.dataset.shareTitle || document.title,
        url: shareButton.dataset.shareUrl || window.location.href,
      };
      const copyPromise = copyWithFallback(shareData.url)
        .then(function () {
          return true;
        })
        .catch(function () {
          return false;
        });

      try {
        if (navigator.share) {
          await navigator.share(shareData);
        }
        const copied = await copyPromise;
        setShareIcon(copied ? "check" : "share", copied ? "Link copied" : "Shared");
      } catch (error) {
        const copied = await copyPromise;
        setShareIcon(copied ? "check" : "error", copied ? "Link copied" : "Unable to copy link");
      }

      setTimeout(function () {
        setShareIcon("share", originalLabel || "Share this page");
      }, 1500);
    });
  }

  setTimeout(setupSingleShareButton, 100);
</script>

<!-- Mobile table of contents drawer. -->
<script defer>
  function setupMobileTableOfContents() {
    const toc = document.getElementById("tableOfContentContainer");
    const tocToggle = document.querySelector(".mobile-toc-toggle");
    const navBar = document.querySelector(".nav-bar");
    const mobileViewport = window.matchMedia("(max-width: 1149px)");

    if (!toc || !tocToggle || !navBar) {
      return;
    }

    const icon = tocToggle.querySelector(".material-symbols-outlined");
    const tocMarker = document.createElement("span");
    tocMarker.classList.add("mobile-toc-marker");
    toc.after(tocMarker);

    function setDrawerTop() {
      const navBottom = navBar.getBoundingClientRect().bottom;
      document.documentElement.style.setProperty(
        "--mobile-toc-top",
        `${Math.ceil(navBottom + 8)}px`,
      );
    }

    function setOpen(isOpen) {
      document.body.classList.toggle("mobile-toc-open", isOpen);
      tocToggle.setAttribute("aria-expanded", isOpen ? "true" : "false");
      tocToggle.setAttribute(
        "aria-label",
        isOpen ? "Close table of contents" : "Open table of contents",
      );
      if (icon) {
        icon.innerText = isOpen ? "close" : "menu";
      }
      if (isOpen) {
        setDrawerTop();
      }
    }

    function updateMobileTocState() {
      if (!mobileViewport.matches) {
        toc.classList.remove("is-mobile-drawer");
        tocToggle.classList.remove("is-visible");
        setOpen(false);
        return;
      }

      setDrawerTop();
      const tocMarkerBounds = tocMarker.getBoundingClientRect();
      const navBounds = navBar.getBoundingClientRect();
      const tocIsPastNavbar = tocMarkerBounds.top <= navBounds.bottom + 4;

      toc.classList.toggle("is-mobile-drawer", tocIsPastNavbar);
      tocToggle.classList.toggle("is-visible", tocIsPastNavbar);

      if (!tocIsPastNavbar) {
        setOpen(false);
      }
    }

    tocToggle.addEventListener("click", function () {
      setOpen(!document.body.classList.contains("mobile-toc-open"));
    });

    toc.addEventListener("click", function (event) {
      if (event.target.closest("a")) {
        setOpen(false);
      }
    });

    document.addEventListener("click", function (event) {
      if (
        document.body.classList.contains("mobile-toc-open") &&
        !event.target.closest("#tableOfContentContainer") &&
        !event.target.closest(".mobile-toc-toggle")
      ) {
        setOpen(false);
      }
    });

    document.addEventListener("keydown", function (event) {
      if (event.key === "Escape") {
        setOpen(false);
      }
    });

    window.addEventListener("scroll", throttle(updateMobileTocState, 100));
    window.addEventListener("resize", throttle(updateMobileTocState, 100));
    if (mobileViewport.addEventListener) {
      mobileViewport.addEventListener("change", updateMobileTocState);
    } else {
      mobileViewport.addListener(updateMobileTocState);
    }
    updateMobileTocState();
  }

  setTimeout(setupMobileTableOfContents, 100);
</script>

<script defer>
  function addCopyButtonToCodeBlocks() {
    // Get all code blocks with a class of "language-*"
    const codeBlocks = document.querySelectorAll('code[class^="language-"]');

    codeBlocks.forEach((codeBlock) => {
      const codeBlockContainer =
        codeBlock.closest(".highlight div") || codeBlock.parentNode;
      const copyButton = document.createElement("button");
      copyButton.classList.add("copy-code-button");
      copyButton.type = "button";
      copyButton.setAttribute("aria-label", "Copy code");
      copyButton.setAttribute("title", "Copy code");
      copyButton.innerHTML =
        '<span class="material-symbols-outlined" aria-hidden="true">content_copy</span>';

      // Add a click event listener to the copy button
      copyButton.addEventListener("click", () => {
        // Copy the code inside the code block to the clipboard
        const elements = codeBlock.querySelectorAll(".cl");
        let codeToCopy = codeBlock.innerText;
        if (elements.length > 0) {
          codeToCopy = "";
          elements.forEach((element) => {
            codeToCopy += element.innerText;
          });
        }
        navigator.clipboard.writeText(codeToCopy);

        // Update the copy button text to indicate that the code has been copied
        copyButton.setAttribute("aria-label", "Code copied");
        copyButton.setAttribute("title", "Code copied");
        copyButton.innerHTML =
          '<span class="material-symbols-outlined" aria-hidden="true">check</span>';
        setTimeout(() => {
          copyButton.setAttribute("aria-label", "Copy code");
          copyButton.setAttribute("title", "Copy code");
          copyButton.innerHTML =
            '<span class="material-symbols-outlined" aria-hidden="true">content_copy</span>';
        }, 1500);
      });

      // Add the copy button to the code block
      codeBlockContainer.append(copyButton);
    });
  }
  setTimeout(function () {
    addCopyButtonToCodeBlocks();
  }, 100);
</script>
