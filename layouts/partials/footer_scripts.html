<!-- Theme toggle. -->
<script defer>
  (function() {
    var btn = document.querySelector('.theme-toggle');
    if (!btn) return;
    var icon = btn.querySelector('.material-symbols-outlined');
    var media = window.matchMedia('(prefers-color-scheme: dark)');

    var ICONS = { system: 'routine', light: 'light_mode', dark: 'dark_mode' };
    var LABELS = {
      system: 'Theme: system (click for light)',
      light: 'Theme: light (click for dark)',
      dark: 'Theme: dark (click for system)'
    };
    var NEXT = { system: 'light', light: 'dark', dark: 'system' };
    var SWAP_MS = 150;
    var initialized = false;
    var swapTimer = null;

    function getSetting() {
      var stored = localStorage.getItem('theme');
      return (stored === 'light' || stored === 'dark' || stored === 'system') ? stored : 'system';
    }

    function resolve(setting) {
      if (setting === 'system') return media.matches ? 'dark' : 'light';
      return setting;
    }

    function setIcon(name) {
      if (!icon) return;
      if (!initialized || icon.innerText === name) {
        icon.innerText = name;
        return;
      }
      if (swapTimer) clearTimeout(swapTimer);
      btn.classList.add('is-swapping');
      swapTimer = setTimeout(function() {
        icon.innerText = name;
        btn.classList.remove('is-swapping');
        swapTimer = null;
      }, SWAP_MS);
    }

    function applySetting(setting) {
      localStorage.setItem('theme', setting);
      document.documentElement.setAttribute('data-theme', resolve(setting));
      setIcon(ICONS[setting]);
      btn.setAttribute('title', LABELS[setting]);
      btn.setAttribute('aria-label', LABELS[setting]);
    }

    applySetting(getSetting());
    initialized = true;

    btn.addEventListener('click', function() {
      applySetting(NEXT[getSetting()]);
    });

    media.addEventListener('change', function() {
      if (getSetting() === 'system') applySetting('system');
    });
  })();
</script>

<!-- Shortcuts. -->
<script defer>
  document.addEventListener("keydown", function (e) {
    if (document.activeElement.isContentEditable) {
      return false;
    }
    if (document.activeElement.tagName == "INPUT") {
      return false;
    }
    if (e.altKey || e.ctrlKey || e.shiftKey) {
      return false;
    }
    var key = e.key;
    if (key === "h") {
      e.preventDefault();
      e.stopPropagation();
      window.location.href = "/";
    } else if (key === "b") {
      e.preventDefault();
      e.stopPropagation();
      window.location.href = "/blog/";
    } else if (key === "p") {
      e.preventDefault();
      e.stopPropagation();
      window.location.href = "/projects/";
    } else if (key === "t") {
      e.preventDefault();
      e.stopPropagation();
      window.location.href = `https://${location.hostname}/tags`;
    } else if (key === "i") {
      e.preventDefault();
      e.stopPropagation();
      const inputs = document.querySelectorAll("input");
      for (let i = 0; i < inputs.length; i++) {
        if (inputs[i].offsetParent !== null) {
          inputs[i].selectionStart = inputs[i].selectionEnd =
            inputs[i].value.length;
          inputs[i].focus();
          break;
        }
      }
    }
    return false;
  });
</script>

<!-- Dynamic toc. -->
<script defer>
  function throttle(fn, wait) {
    var time = Date.now();
    return function () {
      var now = Date.now()
      if (time + wait - now < 0) {
        fn();
        time = now;
      }
    };
  }

  function scrollHandler() {
    // Changed selector to include all headings
    const anchors = Array.from(document.querySelectorAll("body main h1, body main h2, body main h3"));

    function scrollCallback() {
      var scrollTop = window.pageYOffset || document.documentElement.scrollTop;

      // Reset all active states
      document.querySelectorAll('nav ul li a').forEach(link => {
        link.classList.remove("active-toc");
      });

      // Find the last heading that we've scrolled past
      for (var i = anchors.length - 1; i >= 0; i--) {
        var offsetTop = anchors[i].offsetTop;
        if (scrollTop > offsetTop - 75) {
          var anchorId = anchors[i].getAttribute("id");
          var link = document.querySelector(
            'nav ul li a[href="#' + anchorId + '"]',
          );
          if (link) {
            link.classList.add("active-toc");
            break;
          }
        }
      }
    }

    window.addEventListener(
      "scroll",
      throttle(scrollCallback, 200),
    );
  }
  setTimeout(scrollHandler, 100);
</script>

<!-- Single page share button. -->
<script defer>
  function setupSingleShareButton() {
    const shareButton = document.querySelector(".single-share-button");

    if (!shareButton) {
      return;
    }

    const icon = shareButton.querySelector(".material-symbols-outlined");
    const originalLabel = shareButton.getAttribute("aria-label");

    function setShareIcon(name, label) {
      if (icon) {
        icon.innerText = name;
      }
      shareButton.setAttribute("aria-label", label);
      shareButton.setAttribute("title", label);
    }

    function copyWithFallback(text) {
      if (navigator.clipboard && window.isSecureContext) {
        return navigator.clipboard.writeText(text);
      }

      const textarea = document.createElement("textarea");
      textarea.value = text;
      textarea.setAttribute("readonly", "");
      textarea.style.position = "fixed";
      textarea.style.opacity = "0";
      document.body.append(textarea);
      textarea.select();
      document.execCommand("copy");
      textarea.remove();
      return Promise.resolve();
    }

    shareButton.addEventListener("click", async function () {
      const shareData = {
        title: shareButton.dataset.shareTitle || document.title,
        url: shareButton.dataset.shareUrl || window.location.href,
      };
      const copyPromise = copyWithFallback(shareData.url)
        .then(function () {
          return true;
        })
        .catch(function () {
          return false;
        });

      try {
        if (navigator.share) {
          await navigator.share(shareData);
        }
        const copied = await copyPromise;
        setShareIcon(copied ? "check" : "share", copied ? "Link copied" : "Shared");
      } catch (error) {
        const copied = await copyPromise;
        setShareIcon(copied ? "check" : "error", copied ? "Link copied" : "Unable to copy link");
      }

      setTimeout(function () {
        setShareIcon("share", originalLabel || "Share this page");
      }, 1500);
    });
  }

  setTimeout(setupSingleShareButton, 100);
</script>

<!-- Mobile table of contents drawer. -->
<script defer>
  function setupMobileTableOfContents() {
    const toc = document.getElementById("tableOfContentContainer");
    const tocToggle = document.querySelector(".mobile-toc-toggle");
    const navBar = document.querySelector(".nav-bar");
    const mobileViewport = window.matchMedia("(max-width: 1149px)");

    if (!toc || !tocToggle || !navBar) {
      return;
    }

    const icon = tocToggle.querySelector(".material-symbols-outlined");
    const tocMarker = document.createElement("span");
    tocMarker.classList.add("mobile-toc-marker");
    toc.after(tocMarker);

    function setDrawerTop() {
      const navBottom = navBar.getBoundingClientRect().bottom;
      document.documentElement.style.setProperty(
        "--mobile-toc-top",
        `${Math.ceil(navBottom + 8)}px`,
      );
    }

    function setOpen(isOpen) {
      document.body.classList.toggle("mobile-toc-open", isOpen);
      tocToggle.setAttribute("aria-expanded", isOpen ? "true" : "false");
      tocToggle.setAttribute(
        "aria-label",
        isOpen ? "Close table of contents" : "Open table of contents",
      );
      if (icon) {
        icon.innerText = isOpen ? "close" : "menu";
      }
      if (isOpen) {
        setDrawerTop();
      }
    }

    function updateMobileTocState() {
      if (!mobileViewport.matches) {
        toc.classList.remove("is-mobile-drawer");
        tocToggle.classList.remove("is-visible");
        setOpen(false);
        return;
      }

      setDrawerTop();
      const tocMarkerBounds = tocMarker.getBoundingClientRect();
      const navBounds = navBar.getBoundingClientRect();
      const tocIsPastNavbar = tocMarkerBounds.top <= navBounds.bottom + 4;

      toc.classList.toggle("is-mobile-drawer", tocIsPastNavbar);
      tocToggle.classList.toggle("is-visible", tocIsPastNavbar);

      if (!tocIsPastNavbar) {
        setOpen(false);
      }
    }

    tocToggle.addEventListener("click", function () {
      setOpen(!document.body.classList.contains("mobile-toc-open"));
    });

    toc.addEventListener("click", function (event) {
      if (event.target.closest("a")) {
        setOpen(false);
      }
    });

    document.addEventListener("click", function (event) {
      if (
        document.body.classList.contains("mobile-toc-open") &&
        !event.target.closest("#tableOfContentContainer") &&
        !event.target.closest(".mobile-toc-toggle")
      ) {
        setOpen(false);
      }
    });

    document.addEventListener("keydown", function (event) {
      if (event.key === "Escape") {
        setOpen(false);
      }
    });

    window.addEventListener("scroll", throttle(updateMobileTocState, 100));
    window.addEventListener("resize", throttle(updateMobileTocState, 100));
    if (mobileViewport.addEventListener) {
      mobileViewport.addEventListener("change", updateMobileTocState);
    } else {
      mobileViewport.addListener(updateMobileTocState);
    }
    updateMobileTocState();
  }

  setTimeout(setupMobileTableOfContents, 100);
</script>

<script defer>
  function addCopyButtonToCodeBlocks() {
    // Get all code blocks with a class of "language-*"
    const codeBlocks = document.querySelectorAll('code[class^="language-"]');

    codeBlocks.forEach((codeBlock) => {
      const codeBlockContainer =
        codeBlock.closest(".highlight div") || codeBlock.parentNode;
      const copyButton = document.createElement("button");
      copyButton.classList.add("copy-code-button");
      copyButton.type = "button";
      copyButton.setAttribute("aria-label", "Copy code");
      copyButton.setAttribute("title", "Copy code");
      copyButton.innerHTML =
        '<span class="material-symbols-outlined" aria-hidden="true">content_copy</span>';

      // Add a click event listener to the copy button
      copyButton.addEventListener("click", () => {
        // Copy the code inside the code block to the clipboard
        const elements = codeBlock.querySelectorAll(".cl");
        let codeToCopy = codeBlock.innerText;
        if (elements.length > 0) {
          codeToCopy = "";
          elements.forEach((element) => {
            codeToCopy += element.innerText;
          });
        }
        navigator.clipboard.writeText(codeToCopy);

        // Update the copy button text to indicate that the code has been copied
        copyButton.setAttribute("aria-label", "Code copied");
        copyButton.setAttribute("title", "Code copied");
        copyButton.innerHTML =
          '<span class="material-symbols-outlined" aria-hidden="true">check</span>';
        setTimeout(() => {
          copyButton.setAttribute("aria-label", "Copy code");
          copyButton.setAttribute("title", "Copy code");
          copyButton.innerHTML =
            '<span class="material-symbols-outlined" aria-hidden="true">content_copy</span>';
        }, 1500);
      });

      // Add the copy button to the code block
      codeBlockContainer.append(copyButton);
    });
  }
  setTimeout(function () {
    addCopyButtonToCodeBlocks();
  }, 100);
</script>

<script defer>
(function () {
  var COLORS = {
    dark:  ['#161616', '#0e4429', '#006d32', '#26a641', '#39d353'],
    light: ['#ebedf0', '#9be9a8', '#40c463', '#30a14e', '#216e39']
  };

  var MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var CELL = 11, GAP = 3, STEP = 14, LABEL_H = 20;

  function getTheme() {
    var s = localStorage.getItem('theme');
    if (s === 'light' || s === 'dark') return s;
    return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  }

  var LEVEL_LABEL = ['No contributions', 'Low activity', 'Moderate activity', 'High activity', 'Very high activity'];

  function buildWeeks(contributions) {
    var map = {};
    contributions.forEach(function (c) { map[c.date] = c; });

    var today = new Date();
    today.setHours(0, 0, 0, 0);

    var start = new Date(today);
    start.setDate(start.getDate() - 52 * 7 + 1);
    start.setDate(start.getDate() - start.getDay());

    var weeks = [], cur = new Date(start);
    while (cur <= today) {
      var week = [];
      for (var d = 0; d < 7; d++) {
        if (cur > today) break;
        var ds = cur.getFullYear() + '-' +
          (cur.getMonth() < 9 ? '0' : '') + (cur.getMonth() + 1) + '-' +
          (cur.getDate() < 10 ? '0' : '') + cur.getDate();
        var c = map[ds] || { intensity: 0 };
        week.push({ date: ds, intensity: c.intensity });
        cur.setDate(cur.getDate() + 1);
      }
      weeks.push(week);
    }
    return weeks;
  }

  function renderSVG(weeks, theme) {
    var colors = COLORS[theme];
    var W = weeks.length * STEP - GAP;
    var H = 7 * STEP - GAP + LABEL_H;

    var out = '<svg xmlns="http://www.w3.org/2000/svg" width="' + W + '" height="' + H + '" viewBox="0 0 ' + W + ' ' + H + '">';

    var lastMonth = -1;
    for (var w = 0; w < weeks.length; w++) {
      if (!weeks[w].length) continue;
      var m = parseInt(weeks[w][0].date.slice(5, 7)) - 1;
      if (m !== lastMonth) {
        out += '<text x="' + (w * STEP) + '" y="12" font-size="10" fill="currentColor" opacity="0.5" font-family="inherit">' + MONTHS[m] + '</text>';
        lastMonth = m;
      }
    }

    for (var w = 0; w < weeks.length; w++) {
      var week = weeks[w];
      for (var d = 0; d < week.length; d++) {
        var day = week[d];
        var x = w * STEP, y = d * STEP + LABEL_H;
        out += '<rect x="' + x + '" y="' + y + '" width="' + CELL + '" height="' + CELL +
          '" rx="2" ry="2" fill="' + colors[day.intensity] + '">' +
          '<title>' + LEVEL_LABEL[day.intensity] + ' on ' + day.date + '</title>' +
          '</rect>';
      }
    }

    out += '</svg>';
    return out;
  }

  var ghDiv = document.getElementById('gh-data');
  var raw = [];
  var cachedTotal = 0;
  if (ghDiv) {
    try { raw = JSON.parse(ghDiv.getAttribute('data-entries') || '[]'); } catch (e) {}
    cachedTotal = parseInt(ghDiv.getAttribute('data-total') || '0') || 0;
  }

  var cachedWeeks = null;

  function draw() {
    if (!cachedWeeks) return;
    var svg = renderSVG(cachedWeeks, getTheme());
    var container = document.getElementById('github-calendar-container');
    if (container) container.innerHTML = svg;
    var totalEl = document.getElementById('github-contrib-total');
    if (totalEl) totalEl.textContent = cachedTotal.toLocaleString();
  }

  if (!raw.length) {
    var el = document.getElementById('github-calendar-container');
    if (el) el.innerHTML = '<p style="color:var(--text-dim);font-size:.9rem;margin:0">Could not load contributions.</p>';
  } else {
    cachedWeeks = buildWeeks(raw.map(function (c) { return { date: c.d, intensity: c.l }; }));
    draw();
    new MutationObserver(function (ms) {
      ms.forEach(function (m) { if (m.attributeName === 'data-theme') draw(); });
    }).observe(document.documentElement, { attributes: true });
  }
})();
</script>

<!-- Reading progress bar (single pages only). -->
{{ if .IsPage }}
<script defer>
(function () {
  var bar = document.getElementById('reading-progress');
  if (!bar) return;
  function update() {
    var scrolled = window.scrollY || window.pageYOffset;
    var total = document.body.scrollHeight - window.innerHeight;
    bar.style.width = (total > 0 ? Math.min(100, (scrolled / total) * 100) : 0) + '%';
  }
  window.addEventListener('scroll', update, { passive: true });
  update();
})();
</script>
{{ end }}

<!-- Back to top button. -->
<script defer>
(function () {
  var btn = document.getElementById('back-to-top');
  if (!btn) return;
  window.addEventListener('scroll', function () {
    btn.classList.toggle('visible', window.scrollY > 400);
  }, { passive: true });
  btn.addEventListener('click', function () {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
})();
</script>

<!-- Scroll-triggered reveal animations. -->
<script defer>
(function () {
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  var items = document.querySelectorAll('.blog-row, .project-card');
  if (!items.length || !window.IntersectionObserver) return;
  var io = new IntersectionObserver(function (entries) {
    entries.forEach(function (entry) {
      if (entry.isIntersecting) {
        entry.target.classList.add('revealed');
        io.unobserve(entry.target);
      }
    });
  }, { threshold: 0.08 });
  items.forEach(function (el, i) {
    el.classList.add('reveal');
    el.style.transitionDelay = Math.min(i * 40, 200) + 'ms';
    io.observe(el);
  });
})();
</script>
