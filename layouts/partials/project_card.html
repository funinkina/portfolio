<div class="project-card">
    <a href="{{ .RelPermalink }}">
    <div class="project-image-container">
        {{ if .Params.image }}
        {{ partial "processed-image.html" (dict "path" .Params.image "width" 600 "alt" .Title "class" "project-image" "loading" "lazy") }}
        {{ else }}
        <div class="project-placeholder">
            <span>{{ .Title }}</span>
        </div>
        {{ end }}
    </div>
    </a>
    <div class="project-details">
        <h3 class="project-title"><a href="{{ .RelPermalink }}">{{ .Title }}</a></h3>
        <p class="project-description">{{ .Description | default .Summary | plainify }}</p>
        <div class="project-tags">
            {{ range .Params.tags }}
            <span class="tech-tag">{{ . }}</span>
            {{ end }}
        </div>
    </div>
</div>
