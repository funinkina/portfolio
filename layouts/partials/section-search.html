<div class="section-search">
    <input type="text" id="section-search-input"
        placeholder="Search among {{ .Section }}..."
        aria-label="Search {{ .Section }}">
    <button type="button" id="section-search-clear" aria-label="Clear search"
        title="Clear">
        <span class="material-symbols-outlined">close</span>
    </button>
    <button type="button" id="section-search-btn" aria-label="Search">
        <span class="material-symbols-outlined">search</span>
        <p>FIND</p>
    </button>
</div>

<div class="section-sort" role="radiogroup" aria-label="Sort {{ .Section }}">
    <span class="section-sort-label">Sort:</span>
    <label class="sort-option">
        <input type="radio" name="section-sort" value="date-desc" checked>
        <span>Newest</span>
    </label>
    <label class="sort-option">
        <input type="radio" name="section-sort" value="date-asc">
        <span>Oldest</span>
    </label>
    <label class="sort-option">
        <input type="radio" name="section-sort" value="title-asc">
        <span>Title A&ndash;Z</span>
    </label>
    <label class="sort-option">
        <input type="radio" name="section-sort" value="title-desc">
        <span>Title Z&ndash;A</span>
    </label>
</div>
