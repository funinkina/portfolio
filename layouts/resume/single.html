{{ partial "header.html" . }}

{{ $css := resources.Get "css/resume.css" | minify | fingerprint }}
<link rel="stylesheet" href="{{ $css.RelPermalink }}">

<div class="flex justify-end mb-4">
  <button onclick="window.print()"
    class="inline-flex items-center gap-[0.4rem] py-[0.45rem] px-[0.9rem] bg-card border border-complementary text-complementary text-sm cursor-pointer transition-[background-color,color,border-color] duration-200 font-[inherit] hover:bg-accent hover:text-text hover:border-text"
    type="button">
    <span class="material-symbols-outlined text-base pb-0" aria-hidden="true">print</span>
    Print / Save as PDF
  </button>
</div>

<article class="resume-paper">
  <header class="mb-[0.25rem]">
    <h1 class="text-[2rem] font-bold text-[#1a1a1a] m-0 mb-[0.1rem] border-none text-left">{{ .Title }}</h1>
    {{ with .Params.subtitle }}<p
      class="text-base text-[#555] m-0 font-normal tracking-[0.01em]">{{ . }}</p>{{ end }}
  </header>
  <div class="resume-content">{{ .Content }}</div>
</article>

{{ partial "footer.html" . }}
